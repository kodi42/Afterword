name: Afterword
options:
  bundleIdPrefix: com.kodi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"        # iPhone only
    DEVELOPMENT_TEAM: ""               # set in Xcode for on-device installs
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Afterword:
    type: application
    platform: iOS
    sources:
      - path: Afterword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kodi.afterword
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Afterword
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
  AfterwordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AfterwordTests
    dependencies:
      - target: Afterword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kodi.afterword.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Afterword:
    build:
      targets:
        Afterword: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AfterwordTests
